name: Build, Analyze, Scan and Deploy

on:
  push:
    branches:
      - main

jobs:
  build-analyze-scan:
    name: Build, Analyze and Scan
    runs-on: [eks]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Build and analyze with SonarQube
        uses: sonarsource/sonarqube-scan-action@master
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

      - name: npm install dependency
        run: npm install

      - name: Trivy file scan
        run: trivy fs . > trivyfs.txt

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Docker Build and push
        run: |
          docker build -t tic-tac-toe .
          docker tag tic-tac-toe ${{ secrets.DOCKERHUB_USERNAME }}/tic-tac-toe:latest
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/tic-tac-toe:latest

      - name: Image scan
        run: |
          trivy image ${{ secrets.DOCKERHUB_USERNAME }}/tic-tac-toe:latest \
            > trivyimage.txt

  deploy:
    name: Deploy
    needs: build-analyze-scan
    runs-on: [self-hosted]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Docker Login
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Docker pull image
        run: docker pull ${{ secrets.DOCKERHUB_USERNAME }}/tic-tac-toe:latest

      - name: Image scan
        run: |
          trivy image ${{ secrets.DOCKERHUB_USERNAME }}/tic-tac-toe:latest \
            > trivyimagedeploy.txt

      - name: Deploy to container
        run: |
          docker stop game || true
          docker rm game || true
          docker run -d \
            --name game \
            -p 3000:3000 \
            ${{ secrets.DOCKERHUB_USERNAME }}/tic-tac-toe:latest

      - name: Update kubeconfig
        run: |
          aws eks --region ap-south-1 update-kubeconfig \
            --name EKS_CLOUD

      - name: Deploy to Kubernetes
        run: kubectl apply -f deployment-service.yml
