name: Build, Analyze, Scan

on:
  push:
    branches:
      - main

jobs:
  build-analyze-scan:
    name: Build
    runs-on: [eks]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Build and analyze with SonarQube
        uses: sonarsource/sonarqube-scan-action@master
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

      - name: npm install dependency
        run: npm install

      - name: Trivy file scan
        run: trivy fs . > trivyfs.txt

      - name: Login to Docker Hub   # ← Login BEFORE build
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_token }}

      - name: Docker Build and Push
        run: |
          docker build -t tic-tac-toe .
          docker tag tic-tac-toe ${{ secrets.DOCKERHUB_USERNAME }}/tic-tac-toe:latest
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/tic-tac-toe:latest

      - name: Trivy image scan
        run: |
          trivy image ${{ secrets.DOCKERHUB_USERNAME }}/tic-tac-toe:latest > trivyimage.txt
